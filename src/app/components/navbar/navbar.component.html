<nav class="navbar">
  <div class="container">
    <div class="nav-content">
      <div class="logo">SJ Portfolio</div>
      <ul class="nav-links" [class.active]="mobileOpen()">
        <li *ngFor="let item of navItems">
          <a [href]="'#' + item.fragment" (click)="navigate($event, item.fragment)">{{ item.label }}</a>
        </li>
        <li>
          <div class="theme-selector">
            <button class="theme-btn" (click)="toggleDropdown($event)">
              <i class="fas fa-palette"></i>
              <span>{{ themeService.currentName }}</span>
              <i class="fas fa-chevron-down" style="font-size: 0.8rem;"></i>
            </button>
            <div class="theme-dropdown" [class.active]="dropdownOpen()">
              <div
                *ngFor="let theme of themeService.themes"
                class="theme-option"
                [class.active]="themeService.current() === theme.id"
                (click)="selectTheme(theme.id)">
                <span class="theme-color" [style.background]="theme.gradient"></span>
                <span>{{ theme.name }}</span>
              </div>
            </div>
          </div>
        </li>
      </ul>
      <button class="mobile-toggle" (click)="toggleMobile()">
        <i class="fas" [class.fa-bars]="!mobileOpen()" [class.fa-times]="mobileOpen()"></i>
      </button>
    </div>
  </div>
</nav>
